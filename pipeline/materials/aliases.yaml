# Canonical skill ontology: canonical form -> accepted aliases.
# Matching is case-insensitive except for surfaces listed under case_sensitive,
# which must appear exactly as written (guards short tokens like "R", "Go", "C"
# against matching ordinary prose).
#
# Extend freely — this file is data, not code. Keywords the JD analyzer can
# report are limited to this vocabulary plus your profile skills.

